<!doctype html>
<html lang="en">
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ljubljana Map</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  </head>
  <body>
    <div id="progressContainer">
      <div id="progressBar"></div>
      <span id="progressText">0%</span>
    </div>

    <div id="map"></div>

    <div id="gpsModal">
      <div class="gps-card">
        <h3>📍 Enable Location</h3>
        <p>We need your location to show your position on the map. 🗺️</p>
        <button onclick="enableGPS()">Enable GPS</button>
      </div>
    </div>

    <div id="completionModal" class="hidden">
      <div class="completion-card">
        <h2>🎉 Congratulations!</h2>
        <p>You have completed all tasks, you are now a 100% <i>Ljubljančan</i>. 🐉🇸🇮</p>
        <p>Please send your photos, along with your group number, to<br><a href="mailto:martin.coretti@jozefstefan.org">martin.coretti@jozefstefan.org</a>.</p>
        <button onclick="closeCompletion()">Close</button>
      </div>
    </div>

    <div id="cardOverlay" class="hidden">
      <div id="cardContent">
        <button id="closeCard">✕</button>
        <div id="cardBody"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
